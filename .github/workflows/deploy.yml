name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # or the branch you want to deploy from, for example: master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'  # Adjust to the version you're using

    - name: Install dependencies
      run: npm install

    - name: Build and export Next.js site
      run: npm run export

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages  # The branch you want to deploy to
        folder: out  # The folder where Next.js exports the site (by default, it’s `out`)

